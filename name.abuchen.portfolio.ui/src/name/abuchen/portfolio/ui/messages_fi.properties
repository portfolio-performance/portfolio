ColumnAbsolutePerformancePercent_Description = Absoluuttinen tuotto (%) = absoluuttinen tuotto / (alkuper\u00E4inen arvostus + osto/sis\u00E4\u00E4n tulevat toimitukset)\n\nAbsoluuttinen prosentuaalinen tuotto rajoittuu aina raportointikauteen, esim. ostoarvo on arvopaperiposition arvostus raportointikauden alussa.\n\nAbsoluuttinen prosentuaalinen tuotto eroaa "myyntivoitot (nykyiset omistukset)" -luvusta siin\u00E4, ett\u00E4 se sis\u00E4lt\u00E4\u00E4 myytyjen arvopapereiden osingot, verot ja myyntivoitot.

ColumnAbsolutePerformancePercent_MenuLabel = Absoluuttinen tuotto%

ColumnAbsolutePerformancePercent_Option = Abs. tuotto% {0}

ColumnAbsolutePerformance_Description = Absoluuttinen tuotto = markkina-arvo + myynti/l\u00E4htev\u00E4t toimitukset + osingot - verot - maksut - alkuper\u00E4inen arvostus - osto/saapuvat toimitukset\n\nAbsoluuttinen tuottoluku rajoittuu aina raportointikauteen, esim. ostoarvo on arvopaperiposition arvostus raportointikauden alussa.\n\nAbsoluuttinen tuotto eroaa "myyntivoitot (nykyiset omistukset)" -luvusta siin\u00E4, ett\u00E4 se sis\u00E4lt\u00E4\u00E4 myytyjen arvopapereiden osingot, verot ja myyntivoitot.

