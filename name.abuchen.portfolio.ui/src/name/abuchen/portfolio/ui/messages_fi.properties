PrefDescriptionAlphaVantage = Alpha Vantage Inc. tarjoaa ilmaisia \u200B\u200Brajapintoja reaaliaikaiseen ja historialliseen dataan osakkeista, fyysisist\u00E4 valuutoista ja digitaalisista/kryptovaluutoista.\n\nAlpha Vantagen k\u00E4ytt\u00E4miseen tarvitset API-avaimen. Ilmainen API-avain sallii jopa 5 pyynt\u00F6\u00E4 minuutissa. Alpha Vantage tarjoaa ostettavaksi erilaisia \u200B\u200Bpremium-API-avaimia, jotka sallivat jopa 600 pyynt\u00F6\u00E4 minuutissa.\n\nRekister\u00F6idy seuraamalla t\u00E4t\u00E4 linkki\u00E4:

PrefDescriptionCoinGeckoDemoAPIKey = CoinGecko ilmoittaa, ett\u00E4 saadaksesi vakaan rajoituksen 30 kutsua minuutissa, sinun tulee rekister\u00F6ity\u00E4 demo-tilille t\u00E4\u00E4ll\u00E4:\n<a href="https://www.coingecko.com/en/api/pricing">https://www.coingecko.com/en/api/pricing</a>

PrefDescriptionCoingecko = Kasvata pyynt\u00F6nopeuttasi (rate limit) ja p\u00E4\u00E4set pidempiin historiallisten tietojen datasarjoihin antamalla voimassa olevan API-avaimen maksullisesta CoinGecko-tilauksesta.

PrefDescriptionDivvyDiary = Lataa sijoituksesi automaattisesti Portfolio Performance -palvelusta henkil\u00F6kohtaiselle tilillesi DivvyDiaryyn. N\u00E4in voit helposti seurata tulevia osingonmaksuja \u00E4lypuhelimestasi.\n\nToimi seuraavasti:\n1. Luo tili DivvyDiaryyn\n2. Luo API-avain kohdassa "Asetukset"\n3. Tallenna API-avain Portfolio Performance -asetuksiin

PrefDescriptionEODHistoricalData = EOD Historical Data tarjoaa perustietoja, reaaliaikaisia ja p\u00E4ivitt\u00E4isi\u00E4 historiallisia p\u00F6rssikursseja osakkeille, ETF-rahastoille, sijoitusrahastoille ja optioille ymp\u00E4ri maailmaa.

PrefDescriptionFinnhub = Institutionaalista dataa runsaalla ilmaispaketilla.\n\nRajoitukset:\n* Vain henkil\u00F6kohtaiseen k\u00E4ytt\u00F6\u00F6n\n* 60 ilmaista API-puhelua/minuutti\n\nRekister\u00F6idy t\u00E4st\u00E4 linkist\u00E4:

PrefDescriptionLeeway = PWP Leeway UG tarjoaa hintatietoja osakkeista, ETF:st\u00E4, indekseist\u00E4, rahastoista, valuutoista ja kryptovaluutoista.\n\nVihje:\nArvopaperit haetaan ISIN-koodilla.\nHinnat ovat my\u00F6s saatavilla ulkomaisissa valuutoissa.\n\nIlmaisk\u00E4yt\u00F6n rajoitukset:\n* Vain henkil\u00F6kohtaiseen k\u00E4ytt\u00F6\u00F6n\n* 50 API-kutsua/p\u00E4iv\u00E4\n* Noin 1 000 arvopaperia ilmaisessa API-paketissa\n\nSeuraa t\u00E4t\u00E4 linkki\u00E4 rekister\u00F6ity\u00E4ksesi:

PrefDescriptionMyDividends24 = Osakesalkun automaattinen siirto Portfolio Performancesta henkil\u00F6kohtaiselle arvopaperitilille myDividends24:ss\u00E4 mahdollistaa k\u00E4ytt\u00E4jien seurata tulevia osingonmaksuja helposti \u00E4lypuhelimellaan. T\u00E4m\u00E4 k\u00E4tev\u00E4 ominaisuus voi auttaa seuraamaan sijoituksia tehokkaammin.\n\nNoudata vain seuraavia ohjeita:\n1. Lataa myDividends24 AppStoresta tai Google Play Kaupasta.\n2. Luo tili ja luo API-avain kohdassa "Asetukset".\n3. Tallenna API-avain Portfolio Performancen asetuksiin.\n4. Paina "Lataa myDividends24" yl\u00E4valikossa.

PrefDescriptionPortfolioPerformanceID = Sis\u00E4\u00E4nrakennettujen hintatietojen k\u00E4ytt\u00E4miseen tarvitset <strong>Portfolio Performance ID:n</strong> \u2013 t\u00E4m\u00E4 on rekister\u00F6ity s\u00E4hk\u00F6postiosoitteesi.\n\n<strong>Voit k\u00E4ytt\u00E4\u00E4 Portfolio Performancea rekister\u00F6itym\u00E4tt\u00E4.</strong> Kysymme s\u00E4hk\u00F6postiosoitettasi (Portfolio Performance ID) vain, kun haluat k\u00E4ytt\u00E4\u00E4 jotakin seuraavista ominaisuuksista, jotta voimme tunnistaa sinut:\n\n* Lataa <strong>historiallisia hintoja Yhdysvaltain ja Euroopan osakkeille</strong>\n* Tilaajat saavat my\u00F6s p\u00E4\u00E4syn <strong>viiv\u00E4stettyihin hintoihin</strong> valituista Yhdysvaltain p\u00F6rsseist\u00E4\n\nHuomaa:\n* Tietol\u00E4hteit\u00E4 ja arvopapereita hallitaan edelleen normaalisti ty\u00F6p\u00F6yt\u00E4sovelluksessa.\n* Portfoliotiedostossasi ei tapahdu mit\u00E4\u00E4n: se pysyy sinulla \u2013 salattuna, luottamuksellisena ja paikallisena.\n* Emme pyyd\u00E4 sinulta mit\u00E4\u00E4n muita henkil\u00F6tietoja.\n\nKirjautumalla sis\u00E4\u00E4n hyv\u00E4ksyt <a href="https://www.portfolio-performance.app/terms">palveluehdot</a> ja <a href="https://www.portfolio-performance.app/privacy-policy">tietosuojak\u00E4yt\u00E4nn\u00F6n</a>.

PrefDescriptionPortfolioReport = Tietojen synkronointi Portfolio Report Server -palvelimen kanssa.

PrefDescriptionProxy = V\u00E4lityspalvelinta (proxy) k\u00E4ytet\u00E4\u00E4n kurssien, valuuttakurssien ja kuluttajahintaindeksien lataamiseen sek\u00E4 verkkop\u00E4ivitysten tarkistamiseen.\n\nJos kentt\u00E4 \u201DProxy Host\u201D on tyhj\u00E4, v\u00E4lityspalvelinta ei k\u00E4ytet\u00E4.\n\nJos v\u00E4lityspalvelin edellytt\u00E4\u00E4 tunnistautumista, katso ohjeet FAQ-osiosta.

PrefDescriptionQuandl = Quandl on sijoitusalan ammattilaisia palveleva rahoitus-, talous- ja vaihtoehtotietojen alusta.\n\nQuandlin k\u00E4ytt\u00F6\u00E4 varten tarvitset API-avaimen. Maksuttomien tietosy\u00F6tteiden tunnistautuneilla k\u00E4ytt\u00E4jill\u00E4 on yksi samanaikaisuusraja, eli he voivat tehd\u00E4 yhden kutsun kerrallaan, ja heill\u00E4 voi olla toinenkin kutsu jonossa.\n\nRekister\u00F6idy t\u00E4m\u00E4n linkin kautta:

PrefDescriptionTwelveData = Twelve Data on teknologiayritys, joka tarjoaa rahoitusmarkkinadataa ja rahoitusty\u00F6kaluja.\n\nLiittyv\u00E4t kaupank\u00E4yntipaikat m\u00E4\u00E4ritet\u00E4\u00E4n markkinatunnistekoodien (MIC) avulla ISO-10383-standardin mukaisesti.\n\nRajat (ilmainen):\n* Vain henkil\u00F6kohtaiseen k\u00E4ytt\u00F6\u00F6n.\n* 800 API-puhelua/p\u00E4iv\u00E4\n* 8 API-puhelua/minuutti\n* Vain Yhdysvaltain markkinadataa\n\nRekister\u00F6idy seuraamalla t\u00E4t\u00E4 linkki\u00E4:

