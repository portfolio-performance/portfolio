PrefNoteIndirectQuotation = Noteeraukset, joissa maan kotivaluutta on hintavaluutta\n(esimerkiksi euroalueella EUR 0,9009 = USD 1,00), tunnetaan nimell\u00E4\nsuora noteeraus (direct quotation) tai hintanoteeraus (price quotation) kyseisen maan n\u00E4k\u00F6kulmasta.\nT\u00E4t\u00E4 noteeraustapaa k\u00E4ytt\u00E4\u00E4 suurin osa maista.\n\nNoteeraukset, joissa maan kotivaluutta on yksikk\u00F6valuutta\n(esimerkiksi euroalueella USD 1,11 = EUR 1,00), tunnetaan nimell\u00E4\nep\u00E4suora noteeraus (indirect quotation) tai m\u00E4\u00E4r\u00E4noteeraus (quantity quotation).\nT\u00E4t\u00E4 k\u00E4ytet\u00E4\u00E4n brittil\u00E4isiss\u00E4 sanomalehdiss\u00E4 ja se on yleinen my\u00F6s Australiassa, Uudessa-Seelannissa ja euroalueella.\n\nL\u00E4hde: https://en.wikipedia.org/wiki/Exchange_rate\n\nEsimerkkej\u00E4:\n\nEp\u00E4suora (m\u00E4\u00E4r\u00E4-) noteeraus:\nEUR/USD 1,1232\n\u201DYhdell\u00E4 eurolla saa 1,1232 Yhdysvaltain dollaria.\u201D\n\nSuora (hinta-) noteeraus:\nUSD/EUR 0,89\n\u201DYksi Yhdysvaltain dollari maksaa 0,89 euroa.\u201D

PrefNoteStoreSettingsNextToFile = K\u00E4ytt\u00F6liittym\u00E4n asetukset sis\u00E4lt\u00E4v\u00E4t m\u00E4\u00E4rityksi\u00E4, kuten aloitussivun, joidenkin sarakkeiden ja ikkuna-alueiden leveyden, luokittelun\u00E4kym\u00E4n laajennetut solmut ja paljon muuta.\n\nK\u00E4ytt\u00F6liittym\u00E4n asetukset tallennetaan oletusarvoisesti piilotettuna 'ty\u00F6tila' -kansioon. Ne voidaan my\u00F6s tallentaa '.settings' -tiedostoon itse Portfolio Performance -tiedoston viereen. T\u00E4m\u00E4 helpottaa asetusten synkronointia useiden tietokoneiden v\u00E4lill\u00E4.\n\nHuomioi: K\u00E4ytt\u00F6liittym\u00E4n asetuksia ei siirret\u00E4. Jos haluat s\u00E4ilytt\u00E4\u00E4 nykyiset asetukset, tee seuraavaa: avaa Portfolio Performance -tiedosto -> muuta valintaruutua t\u00E4ss\u00E4 -> tallenna tiedosto uudella nimell\u00E4.

