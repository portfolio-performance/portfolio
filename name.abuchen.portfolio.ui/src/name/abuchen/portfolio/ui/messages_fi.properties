HintSubscription = Tilaus tarvitaan vain Yhdysvaltalaisten osakkeiden viiv\u00E4stettyjen hintojen k\u00E4ytt\u00E4miseen.\n\nSek\u00E4 USA:n ett\u00E4 EU:n osakkeiden historiallisten hintojen k\u00E4ytt\u00F6 edellytt\u00E4\u00E4 rekister\u00F6ity\u00E4 k\u00E4ytt\u00E4j\u00E4tili\u00E4, mutta ei vaadi tilausta.\n\nTilauksia hallinnoidaan t\u00E4ll\u00E4 hetkell\u00E4 mobiilisovelluksen kautta. Jos sinulla on aktiivinen premium-tilaus mobiilissa, kirjaudu sis\u00E4\u00E4n samalla k\u00E4ytt\u00E4j\u00E4tilill\u00E4 sek\u00E4 mobiili- ett\u00E4 ty\u00F6p\u00F6yt\u00E4sovelluksessa.\n\nJos olet tehnyt tilauksen sen j\u00E4lkeen, kun kirjauduit ty\u00F6p\u00F6yt\u00E4sovellukseen, saatat joutua p\u00E4ivitt\u00E4m\u00E4\u00E4n tilauksen tilan k\u00E4ytt\u00E4m\u00E4ll\u00E4 p\u00E4ivityspainiketta.\n\nT\u00E4ll\u00E4 hetkell\u00E4 tilausta ei voi ostaa Applen App Storen tai Google Playn ulkopuolelta. T\u00E4m\u00E4 voi muuttua tulevaisuudessa, mutta ei ole t\u00E4ll\u00E4 hetkell\u00E4 mahdollista kaupallisten rajoitteiden vuoksi.

