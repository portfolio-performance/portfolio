PDFImportDebugInformation = <strong>Ohjeet henkil\u00F6tietojen anonymisointiin</strong>\n\n* Kaksoisnapsauta merkki\u00E4 tai merkkijonoa, joka halutaan anonymisoida.\n* Anonymisoi vain henkil\u00F6tiedot ja j\u00E4t\u00E4 muut tiedot tai rahasummat muuttamatta. T\u00E4m\u00E4 on t\u00E4rke\u00E4\u00E4 laskelmien johdonmukaisuuden varmistamiseksi!\n* Kopioi anonymisoitu teksti leikep\u00F6yd\u00E4lle.\n* Tarkista <a href="https://forum.portfolio-performance.info/t/buchungen-aus-pdf-dateien-importieren/38">tuettujen tuontien lista</a>, onko pankkisi tai v\u00E4litt\u00E4j\u00E4si saatavilla.\n* Luo uusi viesti olemassa olevaan aiheeseen anonymisoidulla tekstill\u00E4.\n* Jos pankkisi tai v\u00E4litt\u00E4j\u00E4si ei ole listalla, luo uusi aihe foorumille.\n\nKuvaile ongelma ja toivottu lopputulos mahdollisimman tarkasti. Tarvittaessa lis\u00E4\u00E4 kuvakaappaus selvent\u00E4m\u00E4\u00E4n asiaa.

