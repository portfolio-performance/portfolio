ColumnCapitalGains = P\u00E4\u00E4omatulot (FIFO, nykyinen salkku)

ColumnCapitalGainsGeneric_Description = Arvo rajoittuu aina raportointijaksoon.\nEsimerkiksi hankintahinta on joko raportointijaksolla tehty arvopaperin osto tai arvopaperin arvostus jakson alussa.\n\nHankintakustannuksiin, joilla lasketaan t\u00E4m\u00E4 luovutusvoitto (Capital Gains), ei sis\u00E4lly kaupank\u00E4yntikuluja eik\u00E4 veroja.\nT\u00E4m\u00E4 luovutusvoitto on siis brutto ennen kuluja ja veroja.

ColumnCapitalGainsMovingAverage = P\u00E4\u00E4omatulot (moving average, nykyiset omistukset)

ColumnCapitalGainsMovingAveragePercent = P\u00E4\u00E4omatuloprosentti (moving average, nykyiset omistukset)

ColumnCapitalGainsMovingAveragePercent_Description = P\u00E4\u00E4omatuloprosentti (moving average, nykyiset omistukset) = (markkina-arvo - hankinta-arvo (moving average)) / hankinta-arvo (moving average)\n\nP\u00E4\u00E4omavoitto on aina rajoitettu raportointikauteen, eli hankinta-arvo on joko raportointikauden aikana tehty arvopaperihankinta tai arvopaperin arvo kauden alussa.\n\nLuvussa otetaan huomioon vain raportointikauden lopussa olevat omistukset.\n\nOstohinta lasketaan liukuvan keskiarvon periaatteen (moving average) mukaisesti (toisin kuin FIFO-periaatteessa). \n\nSuomessa k\u00E4ytet\u00E4\u00E4n FIFO-laskentaa verotuksessa.

ColumnCapitalGainsMovingAveragePercent_MenuLabel = Luovutusvoitto% (liukuva keskiarvo, omistukset)

ColumnCapitalGainsMovingAveragePercent_Option = Luovutusvoitto% (MA) {0}

ColumnCapitalGainsMovingAverage_Description = Myyntivoitot (liukuva keskiarvo, nykyiset omistukset) = Markkina-arvo - Ostoarvo (liukuva keskiarvo)\n\nMyyntivoittojen luku rajoittuu aina raportointikauteen, esim. ostoarvo on joko arvopaperin osto raportointikauden aikana tai arvopaperin arvostus kauden alussa.\n\nLuku ottaa huomioon vain omistukset raportointikauden lopussa.\n\nOstoarvo lasketaan liukuvan keskiarvon periaatteella (toisin kuin FIFO-periaatteella).

ColumnCapitalGainsMovingAverage_MenuLabel = Luovutusvoitto (liukuva keskiarvo, omistukset)

ColumnCapitalGainsMovingAverage_Option = Luovutusvoitto (MA) {0}

ColumnCapitalGainsPercent = Luovutusvoitto% (FIFO, omistukset)

ColumnCapitalGainsPercent_Description = Myyntivoittoprosentti (nykyiset omistukset) = (markkina-arvo - hankinta-arvo (FIFO)) / hankinta-arvo (FIFO)\n\nMyyntivoittoluku rajoittuu aina raportointikauteen, esim. hankinta-arvo on joko arvopaperin osto raportointikauden aikana tai arvopaperin arvostus kauden alussa.\n\nLuku ottaa huomioon vain omistukset raportointikauden lopussa.\n\nHankinta-arvo lasketaan FIFO-periaatteen (First In - First Out) mukaisesti.

ColumnCapitalGainsPercent_Option = Luovutusvoitto % (FIFO) {0}

ColumnCapitalGains_Description = Myyntivoitot (nykyiset omistukset) = Markkina-arvo - Hankinta-arvo (FIFO)\n\nMyyntivoittojen luku rajoittuu aina raportointikauteen, esim. hankinta-arvo on joko arvopaperin osto raportointikauden aikana tai arvopaperin arvostus kauden alussa.\n\nLuku ottaa huomioon vain omistukset raportointikauden lopussa.\n\nHankinta-arvo lasketaan FIFO-periaatteen (First In - First Out) mukaisesti.

