TooltipAverageHoldingPeriod = Keskim\u00E4\u00E4r\u00E4inen pitoaika lasketaan seuraavasti:\n\n* Mukana ovat kaikki kaupat, jotka olivat salkussa jossain vaiheessa valitulla raportointikaudella.\n\n* Kunkin arvopaperin pitoaika lasketaan osto- ja myyntiajankohdasta. T\u00E4ll\u00E4 hetkell\u00E4 pidettyjen positioiden oletetaan myyv\u00E4n v\u00E4litt\u00F6m\u00E4sti.\n\n* Position paino lasketaan position ostohinnan suhteesta kaikkien ostohintojen kokonaism\u00E4\u00E4r\u00E4\u00E4n.\n\n* Tulos "kaikkien positioiden keskim\u00E4\u00E4r\u00E4inen pitoaika" on tulojen "pitoaika \u00D7 prosentuaalinen positiopaino" summa kaikissa positioissa.

TooltipCurrentDrawdown = Huippuh\u00E4vi\u00F6 on prosentuaalinen lasku viimeisimm\u00E4st\u00E4 huippuarvosta nykyarvoon.\n\nHuippuarvo saavutettiin p\u00E4iv\u00E4n\u00E4 {0}.

TooltipDateOfExchangeRate = Vaihtokurssi kohteelle {0}

TooltipFIRENumber = FIRE-lukusi on s\u00E4\u00E4st\u00F6jen ja sijoitusten tavoitesumma, jonka haluat saavuttaa taloudellisen riippumattomuuden ja varhaisen el\u00E4k\u00F6itymisen (Financial Independence / Retire Early) saavuttamiseksi. Yleinen nyrkkis\u00E4\u00E4nt\u00F6 arvioi sen 25-kertaiseksi haluttuihin vuotuisiin el\u00E4kemenoihin n\u00E4hden, perustuen kest\u00E4v\u00E4\u00E4n 4 %:n nostos\u00E4\u00E4nt\u00F6\u00F6n.\n\nT\u00E4ss\u00E4 n\u00E4kym\u00E4ss\u00E4 asetat FIRE-luvun manuaalisesti. Aika FIRE-tavoitteeseen arvioidaan nykyisen nettovarallisuutesi, arvioitujen kuukausis\u00E4\u00E4st\u00F6jen ja arvioitujen vuosituottojen perusteella, kuukausittain korkoa korolle -laskennalla.

