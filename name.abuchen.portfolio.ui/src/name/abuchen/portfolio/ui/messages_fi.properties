TooltipSemiVolatility = Puolivarianssi tarkastelee vain arvopaperin negatiivisia heilahteluja.\n\nJos negatiiviset ja positiiviset heilahtelut ovat yht\u00E4 suuret, p\u00E4tee seuraava:\n\nVolatiliteetti(v)=Puolivarianssi(s)\u00D72\n\u200B\nJos nykyinen tietojoukko on tasaisesti jakautunut, puolivarianssi on:\n\n  s = v \u00F7 \u221A2 = {2} \u00F7 \u221A2 = {0}\n\nVertaa t\u00E4t\u00E4 todelliseen puolivarianssiin:\n\n  {0} {1} {3}\n  tasaisesti jakautunut {1} puolivarianssi\n\nPuolivarianssi lasketaan kertyneest\u00E4 (accumulated) tietosarjasta. Siksi performance-neutral -tapahtumat eiv\u00E4t vaikuta. Viikonloput ja pyh\u00E4p\u00E4iv\u00E4t j\u00E4tet\u00E4\u00E4n huomiotta (esim. p\u00E4\u00E4si\u00E4inen ja joulu).

TooltipSharpeRatio = Sharpen luku\n\n(Aikapainotettu kokonaisvuosituotto - Riskit\u00F6n korko) / Volatiliteetti\n({0} - {1}) / {2} = {3}\n\nSharpen luku on rahoituksessa k\u00E4ytetty riskin suhdeluku, jolla mitataan salkunhoitajien ja portfolion suorituskyky\u00E4. Se vertaa sijoitukselta odotettua ylituottoa sen tuoton volatiliteettiin eli arvonvaihteluun, eli kuinka monta lis\u00E4tuottoprosenttia on pystytty saavuttamaan kutakin riskiyksikk\u00F6\u00E4 kohden. Mit\u00E4 suurempi Sharpen luku on, sit\u00E4 suurempi salkun tuotto on suhteessa sen sis\u00E4lt\u00E4m\u00E4\u00E4n riskitasoon.\n\n(L\u00E4hde: Wikipedia)

TooltipTurnoverRate = Salkun kiertonopeus mittaa sit\u00E4, kuinka paljon salkkua "vaihdettiin" koko pitoajan, murto-osana salkun keskim\u00E4\u00E4r\u00E4isest\u00E4 arvosta.\n\nOstot: {0}\nMyynnit: {1}\nKeskim\u00E4\u00E4r\u00E4inen salkun volyymi: {2}\nSalkun kiertonopeus: {3}

TooltipVolatility = Volatiliteetti (tai varianssi) on ajan kuluessa tapahtuvan arvopaperin hinnan vaihtelun mittari.\n\nVolatiliteetti lasketaan kertyneen aikasarjan perusteella. T\u00E4m\u00E4n vuoksi tuottoneutraalit transaktiot eiv\u00E4t vaikuta tulokseen. Viikonloput ja arkipyh\u00E4t j\u00E4tet\u00E4\u00E4n huomiotta (esimerkiksi p\u00E4\u00E4si\u00E4inen ja joulup\u00E4iv\u00E4t).

